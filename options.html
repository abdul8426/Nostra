<style>

/* NAVBAR */
.navbar {

    align-items: center;
    padding: 15px 40px;

    background-color: white;

}

.navbar ul {
    list-style: none;

.logo {

}

/* CENTER CONTENT */
.main {
    height: calc(100vh - 70px);

    align-items: center;

    border-radius: 10px;

}

/* BOX STYLE */
.box {
    width: 220px;
    height: 150px;
    border: 1px solid #ddd;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 15px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.8);
    background-color: whitesmoke;

}

.box:hover {
    background-color: #f2f2f2;
    transform: translateY(-9px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    background-color: white;


}
